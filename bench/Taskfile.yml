version: "3"

vars:
  MODEL: '{{default "openai/gpt-5.4" .MODEL}}'
  WINGMAN_MODEL: '{{default "gpt-5.4" .WINGMAN_MODEL}}'
  CONCURRENCY: '{{default "1" .CONCURRENCY}}'
  AGENT_TIMEOUT_MULTIPLIER: '{{default "1" .AGENT_TIMEOUT_MULTIPLIER}}'
  INCLUDE: '{{default "" .INCLUDE}}'
  EXCLUDE: '{{default "" .EXCLUDE}}'
  LIMIT: '{{default "" .LIMIT}}'
  EFFORT: '{{default "" .EFFORT}}'

  # Lightweight default set: the full dataset minus tasks that cannot provision
  # on macOS/Docker (Windows containers) or are too slow under x86 emulation on
  # Apple Silicon (heavy ML/R/Coq/data-build installs). Override with your own
  # EXCLUDE to adjust.
  DEFAULT_EXCLUDE: >-
    gpt2-codegolf install-windows-3-11
    build-cython-ext caffe-cifar-10 crack-7z-hash custom-memory-heap-crash
    fix-git mteb-leaderboard mteb-retrieve
    bn-fit-modify compile-compcert prove-plus-comm
    hf-model-inference mcmc-sampling-stan rstan-to-pystan
    pytorch-model-cli pytorch-model-recovery
    torch-pipeline-parallelism torch-tensor-parallelism
    sam-cell-seg train-fasttext reshard-c4-data

tasks:
  setup:
    desc: Create the benchmark virtual environment and install pinned Harbor
    dir: '{{.TASKFILE_DIR}}'
    sources:
      - pyproject.toml
      - uv.lock
    generates:
      - .venv/bin/harbor
    env:
      UV_CACHE_DIR: '{{.TASKFILE_DIR}}/.uv-cache'
      UV_PYTHON_INSTALL_DIR: '{{.TASKFILE_DIR}}/.uv-python'
    cmds:
      - uv sync --locked --python 3.12

  check:
    desc: Verify Harbor, Docker, credentials, and the Wingman agent descriptor
    deps: [setup]
    dir: '{{.TASKFILE_DIR}}/..'
    cmds:
      - bench/.venv/bin/harbor --version
      - docker info --format 'Docker {{`{{.ServerVersion}}`}}'
      - python3 -m json.tool bench/tbench/agent.json >/dev/null
      - |
        if [ -z "${WINGMAN_URL:-}" ] && [ -z "${OPENAI_API_KEY:-}" ]; then
          echo "Set WINGMAN_URL/WINGMAN_TOKEN or OPENAI_API_KEY before running a benchmark" >&2
          exit 1
        fi

  tbench:
    desc: Run Terminal-Bench 2 with configurable concurrency
    deps: [check]
    dir: '{{.TASKFILE_DIR}}/..'
    env:
      PYTHONPATH: '{{.TASKFILE_DIR}}/..'
    cmds:
      - |
        bash -euo pipefail -c '
          args=(
            bench/.venv/bin/harbor run
            --dataset terminal-bench/terminal-bench-2
            --extra-instruction-path bench/tbench/instructions.md
            --agent bench.tbench.agent:WingmanAgent
            --model "{{.MODEL}}"
            --n-concurrent "{{.CONCURRENCY}}"
            --agent-timeout-multiplier "{{.AGENT_TIMEOUT_MULTIPLIER}}"
            --jobs-dir bench/jobs
            --yes
          )

          args+=(--ae "WINGMAN_ELICITATION=accept")

          # Disposable task container: let the file tools reach the whole
          # filesystem (e.g. /etc configs) like the shell tool already can,
          # instead of forcing a shell fallback on system-admin tasks.
          args+=(--ae "WINGMAN_SANDBOX=off")

          if [[ -n "{{.EFFORT}}" ]]; then
            args+=(--ae "WINGMAN_EFFORT={{.EFFORT}}")
          fi

          if [[ -n "{{.INCLUDE}}" ]]; then
            args+=(--include-task-name "{{.INCLUDE}}")
          fi
          for x in {{.EXCLUDE}}; do
            args+=(--exclude-task-name "terminal-bench/$x")
          done
          if [[ -n "{{.LIMIT}}" ]]; then
            args+=(--n-tasks "{{.LIMIT}}")
          fi

          if [[ -n "${WINGMAN_URL:-}" ]]; then
            args+=(--ae "WINGMAN_URL=${WINGMAN_URL}")
            args+=(--ae "WINGMAN_TOKEN=${WINGMAN_TOKEN:-}")
            args+=(--ae "WINGMAN_MODEL={{.WINGMAN_MODEL}}")
          else
            args+=(--ae "OPENAI_API_KEY=${OPENAI_API_KEY}")
            if [[ -n "${OPENAI_BASE_URL:-}" ]]; then
              args+=(--ae "OPENAI_BASE_URL=${OPENAI_BASE_URL}")
            fi
            args+=(--ae "OPENAI_DEFAULT_MODEL={{.WINGMAN_MODEL}}")
          fi

          # Keep the host awake for the whole run; a sleeping laptop suspends
          # the long-lived streaming connections and fails trials mid-turn.
          # caffeinate is macOS-only, so fall back to a plain exec elsewhere.
          if command -v caffeinate >/dev/null 2>&1; then
            exec caffeinate -is "${args[@]}"
          fi
          exec "${args[@]}"
        '

  default:
    desc: Run the lightweight default set (skips Windows/heavy-ML tasks that can't provision or are too slow on macOS)
    cmds:
      - task: tbench
        vars:
          EXCLUDE: '{{.DEFAULT_EXCLUDE}}'

  quick:
    desc: Run one representative task from the official Terminal-Bench 2 dataset
    cmds:
      - task: tbench
        vars:
          CONCURRENCY: "1"
          INCLUDE: terminal-bench/openssl-selfsigned-cert
          LIMIT: "1"

  clean:
    desc: Remove the local benchmark environment and Harbor job outputs
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - rm -rf .venv .uv-cache .uv-python jobs
