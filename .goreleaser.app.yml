# Desktop app release — separate from the CLI (.goreleaser.yml) because the
# macOS .app bundle must be built natively on macOS (cgo/Cocoa, no
# cross-compile) and ships as a Homebrew cask (into /Applications), not a
# formula.
#
#   goreleaser release --clean --skip=validate -f .goreleaser.app.yml             # release
#   goreleaser release --snapshot --clean --skip=validate -f .goreleaser.app.yml  # dry run
version: 2

project_name: wingman-app
dist: dist/app

before:
  hooks:
    - sh -c 'cd server/ui && npm ci && npm run build'             # UI -> server/static
    - sh -c 'cd app && go tool appbundle -name "Wingman Agent" -id com.adrianliechti.wingman-agent -description "Wingman Agent" -company "Adrian Liechti" -copyright "© Adrian Liechti" -package . -version {{ .Version }}'

# The hook above assembles the .app; GoReleaser builds no binaries.
builds:
  - id: app
    skip: true

# Zip the prebuilt bundle. dst re-adds the "Contents" dir that GoReleaser strips
# from the glob, yielding "Wingman Agent.app/Contents/...".
archives:
  - id: app
    meta: true
    formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_macOS_arm64"
    files:
      - src: "app/build/bin/Wingman Agent.app/**/*"
        dst: "Wingman Agent.app/Contents"

# Distinct name so it doesn't collide with the CLI's checksums.txt on a shared release.
checksum:
  name_template: "{{ .ProjectName }}_checksums.txt"

# The cask is rendered + pushed to the tap by the script: GoReleaser's OSS cask
# pipe only emits CLI `binary` stanzas (the `app "X.app"` stanza is Pro-only).
publishers:
  - name: homebrew-cask
    ids: [app]
    # Publishers run with a scrubbed env — pass the token through explicitly.
    env:
      - GITHUB_TOKEN={{ .Env.GITHUB_TOKEN }}
    cmd: ./scripts/publish-cask.sh {{ .Version }}

# append: land in an existing release for the tag (or create it), so the desktop
# and CLI release flows don't clash.
release:
  github:
    owner: adrianliechti
    name: wingman-agent
  mode: append
