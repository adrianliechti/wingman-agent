# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

tasks:
  ui:
    desc: Build the web UI assets
    dir: server/ui
    cmds:
      - npm install
      - npm run build

  cli:
    desc: Run the agent TUI
    cmds:
      - go run .

  web:
    desc: Run the server
    deps: [ui]
    cmds:
      - go run . server

  wails:
    desc: Install the Wails v2 CLI if missing
    cmds:
      - go install github.com/wailsapp/wails/v2/cmd/wails@latest
    status:
      - command -v wails >/dev/null 2>&1

  app:
    desc: Build and launch the Wails desktop app
    deps: [ui, wails]
    dir: app
    cmds:
      - wails build
      - open "build/bin/Wingman Agent.app"

  install:
    desc: Install wingman to GOPATH/bin or GOBIN
    deps: [ui]
    cmds:
      - dest="$(go env GOBIN)" && [ -z "$dest" ] && dest="$(go env GOPATH)/bin" && go build -o "$dest/wingman" .
