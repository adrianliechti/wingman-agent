# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

tasks:
  ui:
    desc: Build the web UI assets
    dir: server/ui
    cmds:
      - npm install
      - npm run build

  run:cli:
    desc: Run the agent TUI
    cmds:
      - go run ./cmd/wingman

  run:claw:
    desc: Run the claw multi-agent runner (TUI)
    cmds:
      - go run ./cmd/wingman claw

  run:web:
    desc: Run the web server
    deps: [ui]
    cmds:
      - go run ./cmd/wingman server

  build:app:
    desc: Build the desktop app for this platform; all resources are generated from app/appicon.png
    deps: [ui]
    dir: app
    cmds:
      - go tool appbundle -name "Wingman Agent" -id com.adrianliechti.wingman-agent -description "Wingman Agent" -company "Adrian Liechti" -copyright "© Adrian Liechti" -package .

  run:app:
    desc: Build and launch the desktop app
    deps: [build:app]
    dir: app
    cmds:
      - open -n "build/bin/Wingman Agent.app"

  install:cli:
    desc: Build and install the CLI to GOPATH/bin or GOBIN
    deps: [ui]
    cmds:
      - dest="$(go env GOBIN)" && [ -z "$dest" ] && dest="$(go env GOPATH)/bin" && go build -o "$dest/wingman" ./cmd/wingman

  install:app:
    desc: Build and install the desktop app to /Applications (macOS)
    deps: [build:app]
    dir: app
    cmds:
      - rm -rf "/Applications/Wingman Agent.app"
      - cp -R "build/bin/Wingman Agent.app" "/Applications/Wingman Agent.app"

  install:
    desc: Build and install both the CLI and the desktop app locally
    cmds:
      - task: install:cli
      - task: install:app

  release:cli:
    desc: Release the CLI for all platforms + Homebrew cask + Scoop (needs GITHUB_TOKEN)
    cmds:
      - goreleaser release --clean -f .goreleaser.yml

  release:app:
    desc: Release the macOS desktop app + Homebrew cask (macOS only; needs GITHUB_TOKEN)
    cmds:
      # --skip=validate: skip git-state checks so snapshot/dry runs work from a dirty tree.
      - goreleaser release --clean --skip=validate -f .goreleaser.app.yml

  release:
    desc: Full release — CLI (all platforms) then the desktop app, on the current git tag
    cmds:
      - task: release:cli
      - task: release:app
