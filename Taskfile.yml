# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

tasks:
  ui:
    desc: Build the web UI assets
    dir: server/ui
    cmds:
      - npm install
      - npm run build

  cli:
    desc: Run the agent TUI
    cmds:
      - go run ./cmd/wingman

  server:
    desc: Run the server
    deps: [ui]
    cmds:
      - go run ./cmd/wingman server

  app:
    desc: Build and launch the Wails desktop app
    deps: [ui]
    dir: app
    cmds:
      - go run github.com/wailsapp/wails/v2/cmd/wails@v2.12.0 build -clean
      - open -n "build/bin/Wingman Agent.app"

  install:
    desc: Install wingman to GOPATH/bin or GOBIN
    deps: [ui]
    cmds:
      - dest="$(go env GOBIN)" && [ -z "$dest" ] && dest="$(go env GOPATH)/bin" && go build -o "$dest/wingman" ./cmd/wingman

  release:app:
    desc: Build & release the desktop app + Homebrew cask (macOS only; needs GITHUB_TOKEN)
    cmds:
      - goreleaser release --clean -f .goreleaser.app.yml

  release:app:snapshot:
    desc: Dry-run the desktop app release (builds the .app + zip, no publish)
    cmds:
      - goreleaser release --snapshot --clean -f .goreleaser.app.yml
